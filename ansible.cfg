# @file ansible.cfg
# @package winalux-core
# @description
#   Core Ansible configuration for the Winalux project.
#   Optimized for readability with YAML output and silent interpreter discovery.
#   Configured for rootless execution by default.

[defaults]
# --- General Settings ---
# Silence deprecation warnings to maintain a clean professional output.
deprecation_warnings = False

# Search paths for custom and community roles.
roles_path = ./roles:./ansible/roles

# Default inventory source for the project.
inventory = ./inventory/hosts.yml

# Disable warnings regarding Python interpreter auto-discovery.
interpreter_python = auto_silent

# --- Output Formatting ---
# Configures Ansible to display results in a human-readable YAML format.
stdout_callback = ansible.builtin.default
result_format = yaml
bin_ansible_callbacks = True

[privilege_escalation]
# --- Privilege Management ---
# Rootless execution is preferred; elevation is only triggered when explicitly requested.
become = False
become_method = sudo
become_ask_pass = False
